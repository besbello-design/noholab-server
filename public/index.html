const EMOJIS = {earrings:"💎", necklaces:"📿", rings:"💍", bracelets:"✨", all:"🌟"};
const TOTAL = PRODUCTS.length;

let activeFilter = "all";
let activeTab = "products";
let selected = null;
let profiles = {};
let genImages = {};

// Persist API key
const apiKeyEl = document.getElementById("apiKey");
apiKeyEl.value = localStorage.getItem("noholab_key") || "";
apiKeyEl.oninput = () => localStorage.setItem("noholab_key", apiKeyEl.value);

function log(msg, type) {
  const el = document.getElementById("log");
  const c = type === "success" ? "text-emerald-400" : type === "error" ? "text-red-400" : "text-zinc-400";
  const t = new Date().toLocaleTimeString();
  el.innerHTML = "<div class='" + c + "'><span class='text-zinc-600 mr-1'>" + t + "</span>" + msg + "</div>" + el.innerHTML;
}

function getImgList(id) {
  if (!genImages[id]) return [];
  if (Array.isArray(genImages[id])) return genImages[id].filter(Boolean);
  return Object.values(genImages[id]).filter(Boolean);
}

function updateProgress() {
  const imgs = Object.keys(genImages).reduce((n,id) => n + getImgList(id).length, 0);
  const anas = Object.keys(profiles).length;
  document.getElementById("img-count").textContent = imgs + "/" + TOTAL;
  document.getElementById("ana-count").textContent = anas + "/" + TOTAL;
  document.getElementById("img-bar").style.width = (imgs / TOTAL * 100) + "%";
  document.getElementById("ana-bar").style.width = (anas / TOTAL * 100) + "%";
  const readyN = PRODUCTS.filter(p => getImgList(p.id).length > 0 || profiles[p.id]).length;
  document.getElementById("btn-tab-ready").textContent = "Generados" + (readyN > 0 ? " (" + readyN + ")" : "");
}

function setTab(tab) {
  activeTab = tab;
  document.getElementById("view-products").classList.toggle("hidden", tab !== "products");
  document.getElementById("view-ready").classList.toggle("hidden", tab !== "ready");
  document.getElementById("btn-tab-products").className = "text-xs px-3 py-1.5 rounded-lg border " + (tab === "products" ? "border-violet-700 bg-violet-900/40 text-violet-300" : "border-zinc-700 text-zinc-400");
  document.getElementById("btn-tab-ready").className = "text-xs px-3 py-1.5 rounded-lg border " + (tab === "ready" ? "border-violet-700 bg-violet-900/40 text-violet-300" : "border-zinc-700 text-zinc-400");
  if (tab === "ready") renderReady();
}

function setFilter(f) {
  activeFilter = f;
  renderCats();
  renderGrid();
}

function renderCats() {
  const cats = ["all", "earrings", "necklaces", "rings", "bracelets"];
  document.getElementById("cat-list").innerHTML = cats.map(cat => {
    const count = cat === "all" ? TOTAL : PRODUCTS.filter(p => p.category === cat).length;
    const imgs = cat === "all"
      ? Object.keys(genImages).reduce((n, id) => n + getImgList(id).length, 0)
      : PRODUCTS.filter(p => p.category === cat).reduce((n, p) => n + getImgList(p.id).length, 0);
    const active = activeFilter === cat;
    return "<button onclick=\"setFilter('" + cat + "')\" class=\"w-full flex items-center justify-between px-2 py-1.5 rounded-lg text-xs " + (active ? "bg-violet-900/40 text-violet-300 border border-violet-800/50" : "text-zinc-400 hover:bg-zinc-800") + "\">" +
      "<span class=\"flex items-center gap-1.5\">" + (EMOJIS[cat] || "🌟") + " <span class=\"capitalize\">" + (cat === "all" ? "Todos" : cat) + "</span></span>" +
      "<span>" + (imgs > 0 ? "<span class=\"text-pink-400\">" + imgs + "/</span>" : "") + count + "</span>" +
      "</button>";
  }).join("");
}

function renderGrid() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = PRODUCTS.filter(p =>
    (activeFilter === "all" || p.category === activeFilter) &&
    (!q || p.title.toLowerCase().includes(q))
  );
  document.getElementById("grid-count").textContent = filtered.length + " productos";
  document.getElementById("product-grid").innerHTML = filtered.map(p => cardHTML(p)).join("");
}

function cardHTML(p) {
  const imgs = getImgList(p.id);
  const firstImg = imgs[0];
  const hasProfile = !!profiles[p.id];
  const imgCount = p.images ? p.images.length : 0;
  return "<div class=\"card bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden cursor-pointer\" onclick=\"selectProduct('" + p.id + "')\">" +
    "<div class=\"relative aspect-square bg-zinc-900 overflow-hidden\">" +
    (firstImg
      ? "<img src=\"" + firstImg + "\" class=\"w-full h-full object-cover\">"
      : "<div class=\"w-full h-full flex flex-col items-center justify-center p-3 text-center\"><span class=\"text-4xl mb-2\">" + (EMOJIS[p.category] || "🌟") + "</span><p class=\"text-zinc-400 text-xs leading-tight\">" + p.title.substring(0, 40) + "</p></div>") +
    "<span class=\"absolute top-2 left-2 text-xs bg-black/70 text-violet-300 px-2 py-0.5 rounded-full border border-violet-800/50\">" + p.category + "</span>" +
    (imgs.length > 0 ? "<span class=\"absolute top-2 right-2 text-xs bg-pink-900/80 text-pink-300 px-1.5 py-0.5 rounded-full\">🖼 " + imgs.length + "</span>" : hasProfile ? "<span class=\"absolute top-2 right-2 text-xs bg-emerald-900/80 text-emerald-300 px-1.5 py-0.5 rounded-full\">✓</span>" : "") +
    "</div>" +
    "<div class=\"p-3 space-y-1.5\">" +
    "<p class=\"text-xs text-zinc-300 font-medium leading-tight\" style=\"display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">" + p.title + "</p>" +
    "<p class=\"text-xs text-zinc-500\">" + p.price + " €" + (imgCount > 1 ? " · " + imgCount + " fotos" : "") + "</p>" +
    "<button onclick=\"event.stopPropagation();analyzeProduct('" + p.id + "')\" id=\"abtn-" + p.id + "\" class=\"w-full text-xs py-1.5 rounded-lg bg-violet-900/50 hover:bg-violet-800/70 text-violet-300 border border-violet-800/50\">" + (hasProfile ? "✓ Re-analizar" : "Analizar estilo") + "</button>" +
    "<button onclick=\"event.stopPropagation();generateImages('" + p.id + "')\" id=\"gbtn-" + p.id + "\" class=\"w-full text-xs py-1.5 rounded-lg bg-pink-900/50 hover:bg-pink-800/70 text-pink-300 border border-pink-800/50\">" +
    (imgs.length > 0 ? "🔄 Regenerar (" + imgCount + " fotos)" : "🎨 Generar " + (imgCount > 1 ? imgCount + " imágenes" : "imagen") + " PD Paola") + "</button>" +
    "</div></div>";
}

function selectProduct(id) {
  selected = PRODUCTS.find(p => p.id === id);
  renderDetail();
}

function renderDetail() {
  if (!selected) return;
  const p = selected;
  const prof = profiles[p.id];
  const imgs = getImgList(p.id);
  const shotKeys = genImages[p.id] && typeof genImages[p.id] === "object" && !Array.isArray(genImages[p.id]) ? Object.keys(genImages[p.id]) : imgs.map((_,i) => i);
  if (!prof && imgs.length === 0) { document.getElementById("detail-panel").innerHTML = ""; return; }

  const items = [
    {icon:"📸", label:"Instagram", content: prof && prof.instagram_caption},
    {icon:"📌", label:"Pinterest", content: prof && prof.pinterest_description},
    {icon:"🎵", label:"TikTok", content: prof && prof.tiktok_hook},
    {icon:"🛍️", label:"Etsy", content: prof && prof.etsy_title},
    {icon:"🏪", label:"Shopify Alt", content: prof && prof.shopify_alt_text},
  ].filter(x => x.content);

  let html = "<div class=\"bg-zinc-900 border border-zinc-800 rounded-xl p-4\">";
  html += "<p class=\"text-sm font-semibold text-violet-300 mb-1\">" + p.title + "</p>";
  html += "<p class=\"text-xs text-zinc-500 mb-3\">" + p.price + " € · " + p.category + " · " + (p.images ? p.images.length : 0) + " fotos originales</p>";

  if (imgs.length > 0) {
    html += "<p class=\"text-xs text-zinc-500 mb-2 uppercase tracking-wider font-semibold\">🖼 Imágenes generadas (" + imgs.length + ")</p>";
    html += "<div class=\"grid gap-2 mb-4\" style=\"grid-template-columns:repeat(auto-fill,minmax(130px,1fr))\">";
    imgs.forEach((url, i) => {
      html += "<div class=\"relative group\">" +
        "<img src=\"" + url + "\" class=\"w-full aspect-square object-cover rounded-xl border border-zinc-700\">" +
        "<a href=\"" + url + "\" target=\"_blank\" class=\"absolute inset-0 flex items-end justify-center pb-2 opacity-0 group-hover:opacity-100 transition-opacity\">" +
        "<span class=\"text-xs bg-black/70 text-pink-300 px-2 py-1 rounded-full\">" + (SHOT_LABELS[shotKeys[i]] || "Foto "+(i+1)) + "</span></a>" +
        "</div>";
    });
    html += "</div>";
  }

  if (prof && prof.summary) {
    html += "<div class=\"bg-amber-950/30 border border-amber-800/30 rounded-lg p-2 mb-3\">" +
      "<p class=\"text-xs text-amber-400 font-medium mb-1\">🎨 Estilo PD Paola</p>" +
      "<p class=\"text-xs text-zinc-300\">" + prof.summary + "</p></div>";
  }

  if (items.length > 0) {
    html += "<div class=\"grid grid-cols-2 gap-2\">";
    items.forEach(item => {
      const idx = items.indexOf(item);
      html += "<div class=\"bg-zinc-800/50 rounded-lg p-3\">" +
        "<p class=\"text-xs text-zinc-500 mb-1\">" + item.icon + " " + item.label + "</p>" +
        "<p class=\"text-xs text-zinc-300 leading-relaxed\" style=\"display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden\">" + item.content + "</p>" +
        "<button onclick=\"copyItem('" + p.id + "'," + idx + ")\" class=\"mt-2 text-xs text-violet-400 hover:text-violet-300\">Copiar</button>" +
        "</div>";
    });
    html += "</div>";
  }
  html += "</div>";
  document.getElementById("detail-panel").innerHTML = html;
}

function renderReady() {
  const ready = PRODUCTS.filter(p => getImgList(p.id).length > 0);
  if (ready.length === 0) {
    document.getElementById("ready-grid").innerHTML = "<div class=\"col-span-full flex flex-col items-center py-20\"><p class=\"text-4xl mb-3\">🎨</p><p class=\"text-zinc-400\">Aún no hay imágenes generadas</p></div>";
    return;
  }
  let html = "";
  ready.forEach(p => {
    const imgs = getImgList(p.id);
    const shotKeys = typeof genImages[p.id] === "object" && !Array.isArray(genImages[p.id]) ? Object.keys(genImages[p.id]) : imgs.map((_,i) => i);
    imgs.forEach((url, i) => {
      const label = SHOT_LABELS[shotKeys[i]] || ("Foto " + (i+1));
      html += "<div class=\"bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden\">" +
        "<img src=\"" + url + "\" class=\"w-full aspect-square object-cover\">" +
        "<div class=\"p-2\">" +
        "<p class=\"text-xs text-zinc-300 leading-tight mb-1\" style=\"display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">" + p.title + "</p>" +
        "<p class=\"text-xs text-zinc-500 mb-2\">" + label + " · " + (i+1) + "/" + imgs.length + "</p>" +
        "<a href=\"" + url + "\" target=\"_blank\" class=\"block text-center text-xs py-1 rounded bg-pink-900/40 text-pink-300 border border-pink-800/40\">⬇ Descargar</a>" +
        "</div></div>";
    });
  });
  document.getElementById("ready-grid").innerHTML = html;
}

async function analyzeProduct(id) {
  const key = apiKeyEl.value.trim();
  if (!key) { log("⚠ Introduce tu Anthropic API key", "error"); return; }
  const p = PRODUCTS.find(x => x.id === id);
  const btn = document.getElementById("abtn-" + id);
  if (btn) btn.textContent = "⏳ Analizando…";
  log("Analizando \"" + p.title.substring(0, 30) + "…\"");
  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({product: p, catStyle: {prompt_base: CAT_PROMPTS[p.category]}, anthropicKey: key})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    profiles[id] = data;
    log("✓ \"" + p.title.substring(0, 25) + "…\" analizado", "success");
    updateProgress();
    renderGrid();
    renderCats();
    if (selected && selected.id === id) renderDetail();
  } catch(e) {
    log("✗ " + e.message, "error");
  }
  if (btn) btn.textContent = profiles[id] ? "✓ Re-analizar" : "Analizar estilo";
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// 6 shot types per product: 2 model, 2 detail, 2 product
const SHOT_TYPES = ["model1","model2","detail1","detail2","product1","product2"];
const SHOT_LABELS = {model1:"Modelo 1",model2:"Modelo 2",detail1:"Detalle 1",detail2:"Detalle 2",product1:"Pieza 1",product2:"Pieza 2"};

async function generateImages(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const images = p.images || [];
  if (!images.length) { log("⚠ Sin imágenes", "error"); return; }
  const btn = document.getElementById("gbtn-" + id);
  if (btn) btn.disabled = true;
  genImages[id] = {};
  log("Generando 6 fotos para \"" + p.title.substring(0, 25) + "…\"");

  for (let i = 0; i < SHOT_TYPES.length; i++) {
    const shotType = SHOT_TYPES[i];
    // Use different source images when available, cycle through them
    const srcImg = images[i % images.length];
    if (btn) btn.textContent = "⏳ " + (i + 1) + "/6 " + SHOT_LABELS[shotType] + "…";
    try {
      if (i > 0) await sleep(6000);
      // Use server-side proxy URL so the server fetches it internally
      const proxiedUrl = "/api/proxy-image?url=" + encodeURIComponent(srcImg);
      const res = await fetch("/api/generate-image", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({imageUrl: proxiedUrl, category: p.category, title: p.title, shotType})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      genImages[id][shotType] = data.url;
      log("✓ " + SHOT_LABELS[shotType] + " generada", "success");
      updateProgress();
      if (selected && selected.id === id) renderDetail();
    } catch(e) {
      log("✗ " + SHOT_LABELS[shotType] + ": " + e.message, "error");
    }
  }
  renderGrid();
  renderCats();
  if (activeTab === "ready") renderReady();
  if (btn) { btn.disabled = false; btn.textContent = "🔄 Regenerar 6 fotos"; }
}


function copyItem(productId, idx) {
  const prof = profiles[productId];
  if (!prof) return;
  const items = [prof.instagram_caption, prof.pinterest_description, prof.tiktok_hook, prof.etsy_title, prof.shopify_alt_text].filter(Boolean);
  if (items[idx]) navigator.clipboard.writeText(items[idx]);
}


// ── Zoom Modal ──
function showZoom(url, title) {
  const modal = document.getElementById("zoom-modal");
  document.getElementById("zoom-img").src = url;
  document.getElementById("zoom-title").textContent = title || "";
  document.getElementById("zoom-dl-btn").onclick = () => downloadImage(url, title);
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function hideZoom() {
  const modal = document.getElementById("zoom-modal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

function downloadImage(url, name) {
  const a = document.createElement("a");
  a.href = url;
  a.download = (name || "noholab-image").replace(/[^a-z0-9]/gi, "_").substring(0, 40) + ".png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Init
renderCats();
renderGrid();
</script>

<!-- Zoom Modal -->
<div id="zoom-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/90" onclick="hideZoom()">
  <div class="relative max-w-2xl w-full mx-4" onclick="event.stopPropagation()">
    <button onclick="hideZoom()" class="absolute -top-10 right-0 text-zinc-400 hover:text-white text-2xl">✕</button>
    <img id="zoom-img" src="" class="w-full rounded-xl border border-zinc-700 max-h-[80vh] object-contain bg-zinc-900">
    <div class="flex items-center justify-between mt-3 px-1">
      <p id="zoom-title" class="text-xs text-zinc-400 truncate flex-1 mr-3"></p>
      <button id="zoom-dl-btn" class="text-xs px-4 py-2 rounded-lg bg-pink-900/60 hover:bg-pink-800 text-pink-300 border border-pink-700 shrink-0">⬇ Descargar</button>
    </div>
  </div>
</div>
